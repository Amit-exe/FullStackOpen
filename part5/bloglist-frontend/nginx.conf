    server {
        listen 80;

        # Serve React frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # Critical for React Router — always serve index.html for unknown paths
            try_files $uri $uri/ /index.html;
        }

        # Forward /api requests to Node backend
        # In Docker, containers talk to each other by service name
        location /api {
            proxy_pass http://backend:4001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }